<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Alix Work – Enterprise Management</title>
    <meta name="description" content="Alix Work – Interne Business-Plattform für Auftrags-, Touren- und Finanzverwaltung">
    <meta name="author" content="Lovable" />

    <!-- Font preconnect für schnellere Ladezeiten -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />

    <!-- TODO: Update og:title to match your application name -->
    
    
    <meta property="og:type" content="website" />
    

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    
    <meta property="og:title" content="Alix Work – Enterprise Management">
  <meta name="twitter:title" content="Alix Work – Enterprise Management">
  <meta property="og:description" content="Alix Work – Interne Business-Plattform für Auftrags-, Touren- und Finanzverwaltung">
  <meta name="twitter:description" content="Alix Work – Interne Business-Plattform für Auftrags-, Touren- und Finanzverwaltung">
</head>

  <body>
    <script>
      // Anti-Flicker: setzt Font-Scale + UI-Language vor React-Mount.
      (function () {
        try {
          var map = { sm: 0.9, md: 1.0, lg: 1.15, xl: 1.3, a11y: 1.5 };
          var s = localStorage.getItem('alix-font-scale');
          if (!map[s]) s = 'md';
          document.documentElement.style.setProperty('--font-scale', String(map[s]));
          document.documentElement.setAttribute('data-font-scale', s);
          var lang = localStorage.getItem('ui-lang');
          if (lang) {
            document.documentElement.setAttribute('lang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
